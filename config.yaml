# Stream Deck Home Ops configuration
# All URLs follow the pattern https://{app}.phew.blue unless overridden

install_path: "C:\\StreamDeck-HomeOps"
domain: phew.blue
kromgo_url: https://kromgo.phew.blue

nodes:
  - name: talos-01
    role: control-plane
  - name: talos-02
    role: control-plane
  - name: talos-03
    role: control-plane
  - name: talos-04
    role: worker
  - name: talos-05
    role: worker

# Pinned apps shown on main page row 3 (cols 2-6)
pinned:
  - namespace: observability
    app: grafana
    url: https://grafana.phew.blue
  - namespace: default
    app: gatus
    url: https://status.phew.blue
  - namespace: lab
    app: headlamp
    url: https://headlamp.phew.blue
  - namespace: lab
    app: homepage
    url: https://homepage.phew.blue
  - namespace: home-automation
